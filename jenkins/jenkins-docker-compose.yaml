services:
  jenkins:
    build: .
    container_name: jenkins
    user: root
    network_mode: host
    restart: unless-stopped
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ramin/Projects/devops-demo:/workspace/devops-demo
      - /home/ramin/.kube:/root/.kube

volumes:
  jenkins_home: